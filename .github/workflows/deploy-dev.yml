name: Deploy to Dev

on:
  push:
    branches: [develop]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: development

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_DEV }}
          aws-region: us-east-1

      - name: Configure CodeArtifact
        run: |
          aws codeartifact login --tool npm --domain cloudhesive --domain-owner 952129677059 --repository design-system --region us-east-1 --namespace @cloudhesive || true

      - name: Install dependencies
        working-directory: frontend
        run: npm install --legacy-peer-deps

      - name: Build Frontend
        working-directory: frontend
        run: npx vite build
        env:
          VITE_DEV_BYPASS_AUTH: "true"
          VITE_S3_BUCKET: apexvision-sessions-520754296204
          VITE_AWS_REGION: us-east-1

      - name: Deploy Frontend to S3
        run: |
          aws s3 sync frontend/dist s3://apexvision-dev-dashboard-${{ secrets.AWS_ACCOUNT_ID }} --delete

      - name: Invalidate CloudFront Cache
        run: |
          aws cloudfront create-invalidation --distribution-id ${{ secrets.CLOUDFRONT_DIST_ID_DEV }} --paths "/*" || true
