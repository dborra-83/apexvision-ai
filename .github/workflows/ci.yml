name: CI

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Configure CodeArtifact (if credentials available)
        if: env.AWS_ACCESS_KEY_ID != ''
        run: |
          aws codeartifact login --tool npm --domain cloudhesive --domain-owner 952129677059 --repository design-system --region us-east-1 --namespace @cloudhesive || true
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1

      - name: Install dependencies
        run: npm install --ignore-scripts || npm install --legacy-peer-deps --ignore-scripts
        env:
          NPM_CONFIG_REGISTRY: https://registry.npmjs.org/

      - name: TypeScript check (frontend)
        working-directory: frontend
        run: npx tsc --noEmit || true

      - name: TypeScript check (backend)
        working-directory: backend
        run: npx tsc --noEmit || true

      - name: Python syntax check
        run: |
          python3 -c "
          import ast, sys
          from pathlib import Path
          errors = []
          for f in Path('ml-models/vision').rglob('*.py'):
              try:
                  ast.parse(f.read_text())
              except SyntaxError as e:
                  errors.append(f'{f}: {e}')
          if errors:
              print('\n'.join(errors))
              sys.exit(1)
          print(f'✓ All Python files OK')
          "
