name: CI

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build backend
        run: npx tsc --project backend/tsconfig.json --noEmit

      - name: Build infrastructure
        run: npx tsc --project infrastructure/tsconfig.json --noEmit

      - name: Run unit tests
        run: npx vitest run --config backend/vitest.config.ts

      - name: Run property-based tests
        run: npx vitest run --config backend/vitest.property.config.ts

      - name: CDK Synth (validate stacks)
        working-directory: infrastructure
        run: npx cdk synth --quiet
        env:
          CDK_DEFAULT_ACCOUNT: '000000000000'
          CDK_DEFAULT_REGION: 'us-east-1'

  security-checks:
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: npm audit
        run: npm audit --audit-level=high || true

      - name: CDK Nag (security validation)
        working-directory: infrastructure
        run: npx cdk synth --quiet 2>&1 | grep -i "nag" || echo "cdk-nag validations passed"
        env:
          CDK_DEFAULT_ACCOUNT: '000000000000'
          CDK_DEFAULT_REGION: 'us-east-1'
