name: Deploy to Production

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run all tests
        run: npx vitest run --config backend/vitest.config.ts

      - name: CDK Synth with cdk-nag
        working-directory: infrastructure
        run: npx cdk synth --context env=prod --quiet
        env:
          CDK_DEFAULT_ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID_PROD }}
          CDK_DEFAULT_REGION: us-east-1

  deploy:
    runs-on: ubuntu-latest
    needs: test
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_PROD }}
          aws-region: us-east-1

      - name: CDK Deploy (with rollback on failure)
        working-directory: infrastructure
        run: npx cdk deploy --all --context env=prod --require-approval never --rollback true

      - name: Build Frontend
        working-directory: frontend
        run: npm run build

      - name: Deploy Frontend to S3
        run: |
          aws s3 sync frontend/dist s3://apexvision-prod-dashboard-${{ secrets.AWS_ACCOUNT_ID_PROD }} --delete

      - name: Invalidate CloudFront Cache
        run: |
          aws cloudfront create-invalidation --distribution-id ${{ secrets.CLOUDFRONT_DIST_ID_PROD }} --paths "/*"

      - name: Smoke Test
        run: |
          echo "Running post-deploy health checks..."
          # curl -f https://${{ secrets.API_DOMAIN }}/v1/health || exit 1
